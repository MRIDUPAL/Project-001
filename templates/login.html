{% extends "base.html" %}

{% block title %}
Login
{% endblock %}

{% block content %}

<h2 class="text-center mb-4">Login</h2>

<form
method="POST"
action="/login"
class="mx-auto"
style="max-width:400px;">

<input
class="form-control mb-3"
type="email"
name="email"
placeholder="Email"
required>

<input
class="form-control mb-3"
type="password"
name="password"
placeholder="Password"
required>

<button
class="btn btn-primary w-100">
Login
</button>

</form>

{% endblock %}
