{% extends "base.html" %}

{% block title %}
Register
{% endblock %}

{% block content %}

<h2 class="text-center mb-4">Create Account</h2>

<form
method="POST"
action="/register"
class="mx-auto"
style="max-width:400px;">

    <input
    class="form-control mb-3"
    type="text"
    name="username"
    placeholder="Username"
    required>

    <input
    class="form-control mb-3"
    type="email"
    name="email"
    placeholder="Email"
    required>


    <input
    class="form-control mb-3"
    type="password"
    name="password"
    placeholder="Password"
    required>

    <button
    class="btn btn-success w-100">
        Register
    </button>

</form>

{% endblock %}
